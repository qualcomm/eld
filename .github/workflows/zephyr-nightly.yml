name: Zephyr Nightly with ELD

on:
  #FIXME: comment this back
  pull_request: {} # Uncomment only to test this WF file update.
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:


permissions:
  contents: write
jobs:
  zephyr-build-and-test:
    if: github.repository == 'qualcomm/eld' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci-base:main
      options: --user 0
    strategy:
      fail-fast: false
      matrix:
        target:
          - board: qemu_riscv32
            arch: riscv32
            extra_args: CONFIG_PICOLIBC_USE_TOOLCHAIN=y
          - board: qemu_riscv32_xip
            arch: riscv32
            extra_args: CONFIG_PICOLIBC_USE_TOOLCHAIN=y
          - board: qemu_riscv64
            arch: riscv64
            extra_args: CONFIG_PICOLIBC_USE_TOOLCHAIN=y
          - board: qemu_cortex_m3
            arch: arm
            extra_args: CONFIG_PICOLIBC_USE_TOOLCHAIN=y
          - board: qemu_cortex_a53
            arch: aarch64
            extra_args: CONFIG_PICOLIBC_USE_TOOLCHAIN=y
    env:
      SDK_INSTALL_BASE: /opt/toolchains
      CCACHE_DIR: /root/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "1"
      CCACHE_MAXSIZE: "2G"
      CCACHE_COMPRESS: "1"
      CCACHE_COMPILERCHECK: "content"

    steps:
      - name: Checkout eld
        uses: actions/checkout@v6
        with:
          path: llvm-project/llvm/tools/eld

      - name: Prepare ccache dir
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --version | head -1

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.target.arch }}-sdkllvm-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.target.arch }}-sdkllvm-

      - name: ccache stats (before build)
        run: ccache -s -v || ccache -s

      - name: Record pre-build entry
        if: github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "pre-"
          workflow-name: "zephyr"
          record-mode: "record"
          status: "fail"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.target.arch }}
          branch-name: "main"

      - name: Fetch nightly ELD
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/FetchNightlyToolset

      - name: Clone Zephyr
        uses: actions/checkout@v6
        with:
          repository: zephyrproject-rtos/zephyr
          path: zephyr

      - name: Set safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/zephyr"

      - name: Download and apply ELD support patch
        run: |
          cd zephyr
          wget -q --tries=3 --retry-on-http-error=429,500,502,503,504 --waitretry=5 https://github.com/zephyrproject-rtos/zephyr/pull/103778.patch -O eld-support.patch
          git apply eld-support.patch

      - name: West setup
        run: |
          cd zephyr
          west init -l .
          west update

      - name: Install Zephyr SDK (LLVM toolchain + host tools)
        shell: bash
        run: |
          cd zephyr
          source zephyr-env.sh
          west sdk install --llvm --no-gnu-toolchains --install-base "${SDK_INSTALL_BASE}"

          SDK_LLVM=$(ls -d "${SDK_INSTALL_BASE}"/zephyr-sdk-*/llvm 2>/dev/null | head -1)
          if [ -z "${SDK_LLVM}" ] || [ ! -x "${SDK_LLVM}/bin/clang" ]; then
            echo "Zephyr SDK LLVM toolchain not found under ${SDK_INSTALL_BASE}"
            ls -la "${SDK_INSTALL_BASE}" || true
            exit 1
          fi
          echo "SDK_LLVM=${SDK_LLVM}" >> "$GITHUB_ENV"
          echo "Zephyr SDK clang version:"
          "${SDK_LLVM}/bin/clang" --version | head -1

      - name: Splice nightly ELD into Zephyr SDK LLVM
        run: |
          # SDK LLVM ships no libc++ .so; ld.eld/libLW need it.
          cp inst/bin/ld.eld "${SDK_LLVM}/bin/ld.eld"
          cp inst/lib/libLW.so.4 "${SDK_LLVM}/lib/libLW.so.4"
          ln -sf libLW.so.4 "${SDK_LLVM}/lib/libLW.so"
          cp -P inst/lib/libc++.so.1*    "${SDK_LLVM}/lib/"
          cp -P inst/lib/libc++abi.so.1* "${SDK_LLVM}/lib/"

          # RISC-V multilib fixes (clang-side, no per-build flags):
          #  1. Rewrite the triple Zephyr emits (riscv*-unknown-elf, normalized
          #     to -unknown-unknown-elf) to the canonical -none-elf the SDK
          #     multilibs key on.
          #  2. qemu_riscv64 DT forces 'zicntr' (counter CSRs, no codegen
          #     impact) which has no SDK multilib; map it to the zicntr-free
          #     march for both integer (lp64) and FP (lp64d) configs.
          ML="${SDK_LLVM}/lib/clang-runtimes/multilib.yaml"
          {
            for bits in 32 64; do
              echo "- Match: --target=riscv${bits}-unknown-unknown-elf"
              echo "  Flags:"
              echo "  - --target=riscv${bits}-unknown-none-elf"
            done
            for ext in "" "f2p2_d2p2_"; do
              echo "- Match: -march=rv64i2p1_m2p0_a2p1_${ext}c2p0_zicntr2p0_zicsr2p0_zifencei2p0_zmmul1p0"
              echo "  Flags:"
              echo "  - -march=rv64i2p1_m2p0_a2p1_${ext}c2p0_zicsr2p0_zifencei2p0_zmmul1p0"
            done
          } >> "${ML}"

          echo "Nightly ELD version:"
          "${SDK_LLVM}/bin/ld.eld" --version

      - name: Build hello_world for ${{ matrix.target.board }} with ELD
        shell: bash
        run: |
          cd zephyr
          source zephyr-env.sh
          export ZEPHYR_SDK_INSTALL_DIR="${SDK_INSTALL_BASE}"
          export ZEPHYR_TOOLCHAIN_VARIANT=host/llvm
          export LLVM_TOOLCHAIN_PATH="${SDK_LLVM}"
          west build -p always -b ${{ matrix.target.board }} samples/hello_world -- \
            -DCONFIG_LLVM_USE_ELD=y \
            -DCONFIG_COMPILER_RT_RTLIB=y \
            ${{ matrix.target.extra_args && format('-D{0}', matrix.target.extra_args) }}

      - name: Run hello_world on QEMU
        shell: bash
        run: |
          cd zephyr
          source zephyr-env.sh
          # No pipe to tee: qemu_riscv32_xip uses -machine sifive_e which has
          # no QEMU exit mechanism, so QEMU outlives `timeout` and would keep
          # tee blocked. pkill below frees the CPU for the next step.
          timeout -k 1s 5s west build -t run > run_output.log 2>&1 || true
          pkill -KILL -f "qemu-system.*build/zephyr/zephyr.elf" 2>/dev/null || true
          cat run_output.log
          if grep -q "Hello World" run_output.log; then
            echo "hello_world executed successfully"
          else
            echo "hello_world did not produce expected output"
            exit 1
          fi

      - name: Run twister tests for ${{ matrix.target.board }} with ELD
        shell: bash
        run: |
          cd zephyr
          source zephyr-env.sh
          export ZEPHYR_SDK_INSTALL_DIR="${SDK_INSTALL_BASE}"
          # Twister reads the variant from the env, not -x=; --force-toolchain
          # since these boards' yaml don't list host/llvm.
          export ZEPHYR_TOOLCHAIN_VARIANT=host/llvm
          export LLVM_TOOLCHAIN_PATH="${SDK_LLVM}"
          west twister -W -p ${{ matrix.target.board }} \
            -T tests/kernel \
            --force-toolchain \
            --inline-logs \
            --timestamps \
            -j 3 \
            -v \
            -x=CONFIG_LLVM_USE_ELD=y \
            -x=CONFIG_COMPILER_RT_RTLIB=y \
            ${{ matrix.target.extra_args && format('-x={0}', matrix.target.extra_args) }}

      - name: Upload twister results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zephyr-twister-results-${{ matrix.target.board }}
          path: |
            zephyr/twister-out/twister.log
            zephyr/twister-out/twister.json

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zephyr-build-artifacts-${{ matrix.target.board }}
          path: |
            zephyr/build/zephyr/zephyr.elf
            zephyr/build/zephyr/zephyr.map

      - name: ccache stats (after build)
        if: always()
        run: ccache -s -v || ccache -s

      - name: Update build entry
        if: success() && github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "post-"
          workflow-name: "zephyr"
          record-mode: "update"
          status: "pass"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.target.arch }}
          branch-name: "main"
