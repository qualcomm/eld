name: nightly picolibc builder

on:
  pull_request:
    paths:
      - '.github/workflows/picolibc-builder.yml'
  schedule:
    # 10:00 PM Central
    - cron: '0 4 * * *'
  workflow_dispatch:     # Allows manual triggering


permissions:
  contents: write
jobs:
  build-and-test:
    name: ${{ matrix.arch.name }}
    if: github.repository == 'qualcomm/eld'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: hexagon
            picolibc-name: hexagon
            triple: hexagon-unknown-none-elf
            llvm-target: Hexagon
            picolibc-default-config: "-Dc_link_args=-L$(clang -print-resource-dir)/lib/hexagon-unknown-none-elf"
            picolibc-no-tls: "-Dc_link_args=-L$(clang -print-resource-dir)/lib/hexagon-unknown-none-elf -Dthread-local-storage=false "
            picolibc-tls-ie: "-Dc_link_args=-L$(clang -print-resource-dir)/lib/hexagon-unknown-none-elf -Dtls-model=initial-exec"
          - name: aarch64
            picolibc-name: aarch64
            triple: aarch64-none-elf
            llvm-target: AArch64
            picolibc-default-config: ""
            picolibc-no-tls: "-Dthread-local-storage=false"
            picolibc-tls-ie: "-Dtls-model=initial-exec"
          - name: riscv64
            picolibc-name: riscv
            triple: riscv64-unknown-unknown-elf
            llvm-target: RISCV
            picolibc-default-config: ""
            picolibc-no-tls: "-Dthread-local-storage=false"
            picolibc-tls-ie: "-Dtls-model=initial-exec"
          - name: riscv32
            picolibc-name: rv32imafdc
            triple: riscv32-unknown-unknown-elf
            llvm-target: RISCV
            picolibc-default-config: ""
            picolibc-no-tls: "-Dthread-local-storage=false"
            picolibc-tls-ie: "-Dtls-model=initial-exec"
            extra-c-flags: "-march=rv32imafdc -mabi=ilp32d"
            extra-cxx-flags: "-march=rv32imafdc -mabi=ilp32d"
          - name: arm
            picolibc-name: arm
            triple: arm-none-eabi
            llvm-target: ARM
            picolibc-default-config: ""
            picolibc-no-tls: "-Dthread-local-storage=false"
            picolibc-tls-ie: "-Dtls-model=initial-exec"
            extra-c-flags: "-march=armv7-a"
            extra-cxx-flags: "-march=armv7-a"
          - name: x86_64
            picolibc-name: x86_64
            triple: x86_64-none-elf
            llvm-target: X86
            picolibc-default-config: "-Dc_link_args=-L$(clang -print-resource-dir)/lib/x86_64-none-elf"
            picolibc-no-tls: "-Dc_link_args=-L$(clang -print-resource-dir)/lib/x86_64-none-elf -Dthread-local-storage=false"
            picolibc-tls-ie: "-Dc_link_args=-L$(clang -print-resource-dir)/lib/x86_64-none-elf -Dtls-model=initial-exec"

    steps:
      - name: Set up Clang 20
        uses: egor-tensin/setup-clang@23bc15cd4207e45f1566447deb48f4ff3ef932cb #v2.3
        with:
          version: "20"
          platform: x64

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libc++-dev libc++abi-dev ccache libclang-rt-20-dev cmake ninja-build make bison flex python3 m4 git libglib2.0-dev lld
      - name: Checkout LLVM Project
        run: |
          git clone --branch main --single-branch --depth 1 https://github.com/llvm/llvm-project ${{ github.workspace }}/llvm-project

      - name: Checkout ELD
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: llvm-project/llvm/tools/eld

      - name: Configure workflow environment variables
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/ConfigureBuildWorkflowENV

      - name: Record pre-build entry
        if: github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "pre-"
          workflow-name: "picolibc"
          record-mode: "record"
          status: "fail"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.arch.name }}
          branch-name: "${{env.BUILD_BRANCH}}"

      - name: Configure LLVM toolchain for ${{ matrix.arch.name }}
        run: |

          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
            -DLLVM_ENABLE_PROJECTS="llvm;clang" \
            -DLLVM_DEFAULT_TARGET_TRIPLE=${{ matrix.arch.triple }} \
            -DCMAKE_C_COMPILER=`which clang` \
            -DCMAKE_CXX_COMPILER=`which clang++` \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DLLVM_TARGETS_TO_BUILD=${{ matrix.arch.llvm-target }} \
            -DELD_TARGETS_TO_BUILD=${{ matrix.arch.llvm-target }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain \
            -S ${{ github.workspace }}/llvm-project/llvm \
            -B ${{ github.workspace }}/build-${{ matrix.arch.name }}-toolchain/ \

      - name: Build LLVM toolchain for ${{ matrix.arch.name }}
        run: |
          cmake --build ${{ github.workspace }}/build-${{ matrix.arch.name }}-toolchain/ -- install

      - name: Build compiler-rt builtins
        run: |
          export TOOLCHAIN_INSTALL=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/
          export PATH=$TOOLCHAIN_INSTALL/bin:$PATH
          if [ ${{ matrix.arch.name }} = "hexagon" ]; then
            cmake -G Ninja \
              -DCMAKE_C_COMPILER:STRING=`which clang` \
              -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
              -DCMAKE_CXX_COMPILER:STRING=`which clang++` \
              -DCMAKE_BUILD_TYPE=Release \
              -DLLVM_CMAKE_DIR:PATH=$TOOLCHAIN_INSTALL \
              -DCMAKE_INSTALL_PREFIX:PATH=$($TOOLCHAIN_INSTALL/bin/clang -print-resource-dir) \
              -C ${{ github.workspace }}/llvm-project/compiler-rt/cmake/caches/hexagon-builtins-baremetal.cmake \
              -B build-${{ matrix.arch.triple }}-builtins/ \
              -S ${{ github.workspace }}/llvm-project/compiler-rt/
          else
            cmake -G Ninja \
              -DCMAKE_C_COMPILER:STRING=`which clang` \
              -DCMAKE_CXX_COMPILER:STRING=`which clang++` \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON \
              -DCMAKE_INSTALL_PREFIX:PATH=$(clang -print-resource-dir) \
              -DCOMPILER_RT_BAREMETAL_BUILD=ON \
              -DCOMPILER_RT_BUILD_BUILTINS=ON \
              -DCOMPILER_RT_BUILD_SANITIZERS=OFF \
              -DCOMPILER_RT_BUILD_XRAY=OFF \
              -DCOMPILER_RT_BUILD_LIBFUZZER=OFF \
              -DCOMPILER_RT_BUILD_PROFILE=OFF \
              -DCMAKE_C_COMPILER_TARGET=${{ matrix.arch.triple }} \
              -DLLVM_ENABLE_PER_TARGET_RUNTIME_DIR=ON \
              -DCMAKE_C_FLAGS="--target=${{ matrix.arch.triple }} -ffreestanding ${{ matrix.arch.extra-c-flags }}" \
              -DCMAKE_CXX_FLAGS="--target=${{ matrix.arch.triple }} -ffreestanding ${{ matrix.arch.extra-cxx-flags }}" \
              -DCMAKE_ASM_FLAGS="--target=${{ matrix.arch.triple }} ${{ matrix.arch.extra-cxx-flags }}" \
              -DCMAKE_C_COMPILER_FORCED=ON \
              -DCMAKE_CXX_COMPILER_FORCED=ON \
              -DCMAKE_CROSSCOMPILING=ON \
              -DCOMPILER_RT_DEFAULT_TARGET_ONLY=ON \
              -B build-${{ matrix.arch.triple }}-builtins/ \
              -S ${{ github.workspace }}/llvm-project/compiler-rt/
          fi
          cmake --build ${{ github.workspace }}/build-${{ matrix.arch.triple }}-builtins/ -- install-builtins

      - name: Pack toolchain tarball
        if: false
        run: |
          tar -C ${{ github.workspace }}/ \
              -Jcvf install-${{ matrix.arch.name }}-toolchain.tar.xz install-${{ matrix.arch.name }}-toolchain

      - name: Upload toolchain tarball
        if: false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: install-${{ matrix.arch.name }}-toolchain.tar.xz
          path: install-${{ matrix.arch.name }}-toolchain.tar.xz
          retention-days: 2

      - name: Install Meson
        run: |
          git clone https://github.com/mesonbuild/meson.git meson
          cd meson
          ./packaging/create_zipapp.py --outfile meson.pyz --interpreter '/usr/bin/env python3' .
          mkdir -p bin
          ln -s $(realpath meson.pyz) bin/meson
          echo "PATH=$PWD/bin:$PATH" >> $GITHUB_ENV

      - name: Set up ELD i386 linker wrapper (x86_64 only)
        if: matrix.arch.name == 'x86_64'
        run: |
          # ELD has no i386 backend. picolibc builds a 32-bit semihosting BIOS for QEMU
          # using elf_i386 emulation. Route that to lld; all others go to eld.
          export PATH=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/bin:$PATH
          ELD_BIN=$(which ld.eld)
          ELD_DIR=$(dirname "$ELD_BIN")
          LLD_BIN=$(which ld.lld 2>/dev/null || which ld.lld-20 2>/dev/null || which ld.lld-19 2>/dev/null)
          if [ -z "$LLD_BIN" ]; then
            echo "ERROR: ld.lld not found"; exit 1
          fi
          mv "$ELD_BIN" "$ELD_DIR/ld.eld.real"
          ELD_REAL="$ELD_DIR/ld.eld.real"
          printf '%s\n' \
            '#!/bin/sh' \
            'for arg in "$@"; do' \
            '    case "$arg" in' \
            "        -melf_i386|elf_i386|-m32) exec \"$LLD_BIN\" \"\$@\" ;;" \
            '    esac' \
            'done' \
            "exec \"$ELD_REAL\" \"\$@\"" \
            > "$ELD_BIN"
          chmod +x "$ELD_BIN"
          # Verify
          ld.eld --version 2>&1 | head -1
          ld.eld -melf_i386 --version 2>&1 | head -1

      - name: Checkout Picolibc
        run: |
          git clone https://github.com/picolibc/picolibc.git ${{ github.workspace }}/picolibc
          if [ "${{ matrix.arch.name }}" = "riscv64" ] || [ "${{ matrix.arch.name }}" = "riscv32" ]; then
            cd ${{ github.workspace }}/picolibc
            git config user.name "CI Bot"
            git config user.email "ci@example.com"
            git remote add quic-k https://github.com/quic-k/picolibc.git
            git fetch quic-k arm_riscv_ci
            # use a temporary patches for riscv
            git cherry-pick $(git rev-list -n 2 quic-k/arm_riscv_ci)
          fi

      - name: Build Picolibc for ${{ matrix.arch.name }}, default-config
        run: |
          export PATH=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/bin:$PATH
          cd ${{ github.workspace }}/picolibc
          mkdir -p build-clang-${{ matrix.arch.name }}-picolibc-default-config
          cd build-clang-${{ matrix.arch.name }}-picolibc-default-config
          if [ "${{ matrix.arch.name }}" = "x86_64" ]; then
            ../scripts/do-eld-x86_64-configure ${{ matrix.arch.picolibc-default-config }}
          else
            export CC_LD=eld
            export CXX_LD=eld
            ../scripts/do-clang-${{ matrix.arch.picolibc-name }}-configure -Dc_ld=ld.eld -Dcpp_ld=ld.eld ${{ matrix.arch.picolibc-default-config }} -Dc_args="${{ matrix.arch.extra-c-flags }}" -Dcpp_args="${{ matrix.arch.extra-cxx-flags }}"
          fi
          ninja

      - name: Build Picolibc for ${{ matrix.arch.name }}, no-tls
        run: |
          export PATH=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/bin:$PATH
          cd ${{ github.workspace }}/picolibc
          mkdir -p build-clang-${{ matrix.arch.name }}-picolibc-no-tls
          cd build-clang-${{ matrix.arch.name }}-picolibc-no-tls
          if [ "${{ matrix.arch.name }}" = "x86_64" ]; then
            ../scripts/do-eld-x86_64-configure ${{ matrix.arch.picolibc-no-tls }}
          else
            export CC_LD=eld
            export CXX_LD=eld
            ../scripts/do-clang-${{ matrix.arch.picolibc-name }}-configure -Dc_ld=ld.eld -Dcpp_ld=ld.eld ${{ matrix.arch.picolibc-no-tls }} -Dc_args="${{ matrix.arch.extra-c-flags }}" -Dcpp_args="${{ matrix.arch.extra-cxx-flags }}"
          fi
          ninja

      - name: Build Picolibc for ${{ matrix.arch.name }}, tls-ie
        run: |
          export PATH=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/bin:$PATH
          cd ${{ github.workspace }}/picolibc
          mkdir -p build-clang-${{ matrix.arch.name }}-picolibc-tls-ie
          cd build-clang-${{ matrix.arch.name }}-picolibc-tls-ie
          if [ "${{ matrix.arch.name }}" = "x86_64" ]; then
            ../scripts/do-eld-x86_64-configure ${{ matrix.arch.picolibc-tls-ie }}
          else
            export CC_LD=eld
            export CXX_LD=eld
            ../scripts/do-clang-${{ matrix.arch.picolibc-name }}-configure -Dc_ld=ld.eld -Dcpp_ld=ld.eld ${{ matrix.arch.picolibc-tls-ie }} -Dc_args="${{ matrix.arch.extra-c-flags }}" -Dcpp_args="${{ matrix.arch.extra-cxx-flags }}"
          fi
          ninja

      - name: Get QEMU
        run: |
          if [ ${{ matrix.arch.name }} = "hexagon" ]; then
            # git clone --branch hex-next --single-branch --depth 1 https://github.com/quic/qemu.git ${{ github.workspace }}/qemu-system-hexagon
            git clone --depth 1 --branch hexagon-sysemu-11-nov-2025 https://github.com/quic/qemu.git ${{ github.workspace }}/qemu-system-hexagon
            QEMU_INSTALL=${{ github.workspace }}/install-qemu-system-hexagon/
            cd ${{ github.workspace }}/qemu-system-hexagon
            ./configure --target-list=hexagon-softmmu --prefix=$QEMU_INSTALL
            cd build
            ninja install
            echo "PATH=$QEMU_INSTALL/bin/:$PATH" >> $GITHUB_ENV
          else
            sudo apt install qemu-system-arm qemu-system-aarch64 qemu-system-riscv32 qemu-system-riscv64 qemu-system-x86
          fi

      - name: Run Picolibc tests for ${{ matrix.arch.name }}, default-config
        run: |
          export PATH=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/bin:$PATH
          cd ${{ github.workspace }}/picolibc/build-clang-${{ matrix.arch.name }}-picolibc-default-config
          ninja test

      - name: Run Picolibc tests for ${{ matrix.arch.name }}, no-tls
        run: |
          export PATH=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/bin:$PATH
          cd ${{ github.workspace }}/picolibc/build-clang-${{ matrix.arch.name }}-picolibc-no-tls
          ninja test

      - name: Run Picolibc tests for ${{ matrix.arch.name }}, tls-ie
        run: |
          export PATH=${{ github.workspace }}/install-${{ matrix.arch.name }}-toolchain/bin:$PATH
          cd ${{ github.workspace }}/picolibc/build-clang-${{ matrix.arch.name }}-picolibc-tls-ie
          ninja test

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: test-results-${{ matrix.arch.name }}
          path: |
            picolibc/build-clang-${{ matrix.arch.name }}-picolibc-default-config/meson-logs/testlog.txt
            picolibc/build-clang-${{ matrix.arch.name }}-picolibc-no-tls/meson-logs/testlog.txt
            picolibc/build-clang-${{ matrix.arch.name }}-picolibc-tls-ie/meson-logs/testlog.txt
          if-no-files-found: ignore
          retention-days: 2

      - name: Update build entry
        if: github.event_name == 'schedule'
        uses: ./llvm-project/llvm/tools/eld/.github/workflows/BuildStatusDataRecorder
        with:
          enabled: true
          project: "llvm-project/llvm/tools/eld"
          stage: "post-"
          workflow-name: "picolibc"
          record-mode: "update"
          status: "pass"
          run-id: ${{github.run_id}}
          arch-name: ${{ matrix.arch.name }}
          branch-name: "${{env.BUILD_BRANCH}}"
