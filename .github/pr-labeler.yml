github-workflow:
  - changed-files:
    - any-glob-to-any-file:
      - .github/workflows/**
      - .github/dependabot.yml
      - .github/pr-labeler.yml

cmake:
  - changed-files:
    - any-glob-to-any-file:
      - cmake/**
      - '**/CMakeLists.txt'

